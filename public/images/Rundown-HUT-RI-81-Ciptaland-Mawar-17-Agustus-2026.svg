<svg width="800" height="1200" viewBox="0 0 800 1200" xmlns="http://www.w3.org/2000/svg">
  <rect width="800" height="1200" fill="white"/>
  <!-- Header -->
  <text x="20" y="50" font-family="Arial Black" font-size="40" fill="#dc2626">81</text>
  <text x="70" y="35" font-family="Arial" font-size="12" font-weight="bold">TH</text>
  <text x="70" y="50" font-family="Arial" font-size="14" font-weight="bold">DIRGAHAYU</text>
  <text x="70" y="65" font-family="Arial" font-size="14" font-weight="bold">REPUBLIK</text>
  <text x="70" y="80" font-family="Arial" font-size="14" font-weight="bold" fill="#dc2626">INDONESIA</text>
  <rect x="20" y="90" width="140" height="15" fill="#991b1b"/>
  <text x="25" y="100" font-family="Arial" font-size="8" fill="white">17 AGUSTUS 1945 - 17 AGUSTUS 2026</text>
  
  <line x1="180" y1="20" x2="180" y2="110" stroke="#dc2626" stroke-width="2"/>
  <text x="190" y="30" font-family="Arial" font-size="10" font-weight="bold">PROPOSAL KEGIATAN</text>
  <text x="190" y="45" font-family="Arial" font-size="10" font-weight="bold">PERINGATAN HUT RI KE-81 TAHUN 2026</text>
  <rect x="190" y="50" width="280" height="15" fill="#991b1b"/>
  <text x="195" y="60" font-family="Arial" font-size="8" fill="white">RT 002 RW 014 PERUMAHAN CIPTALAND BLOK MAWAR</text>
  <text x="190" y="80" font-family="Arial" font-size="8">Kecamatan Sekupang - Kota Batam</text>
  
  <!-- Title -->
  <rect x="80" y="120" width="640" height="50" rx="5" fill="#7f1d1d"/>
  <text x="400" y="140" text-anchor="middle" font-family="Arial Black" font-size="20" fill="white">D. RUNDOWN HARI PELAKSANAAN</text>
  <text x="400" y="160" text-anchor="middle" font-family="Arial" font-size="14" fill="white">(17 AGUSTUS 2026)</text>
  
  <text x="400" y="190" text-anchor="middle" font-family="Arial" font-size="10">Rangkaian kegiatan pada hari pelaksanaan Peringatan HUT RI Ke-81</text>
  <text x="400" y="202" text-anchor="middle" font-family="Arial" font-size="10">di RT 002 RW 014 Perumahan Ciptaland Blok Mawar.</text>
  
  <!-- PAGI -->
  <rect x="20" y="220" width="60" height="40" rx="5" fill="#15803d"/>
  <text x="50" y="235" text-anchor="middle" font-family="Arial Black" font-size="12" fill="white">PAGI</text>
  <text x="50" y="250" text-anchor="middle" font-family="Arial" font-size="8" fill="white">06.00-10.00 WIB</text>
  
  <rect x="100" y="220" width="680" height="100" fill="white" stroke="#86efac" stroke-width="1" rx="10"/>
  <text x="110" y="240" font-family="Arial" font-size="10" font-weight="bold">06.00-07.00</text>
  <text x="200" y="240" font-family="Arial" font-size="11" font-weight="bold" fill="#15803d">REGISTRASI PESERTA</text>
  <text x="200" y="252" font-family="Arial" font-size="8" fill="#4b5563">Pendaftaran peserta lomba dan absensi kehadiran warga.</text>
  
  <text x="110" y="270" font-family="Arial" font-size="10" font-weight="bold">07.00-08.00</text>
  <text x="200" y="270" font-family="Arial" font-size="11" font-weight="bold" fill="#15803d">UPACARA PERINGATAN</text>
  <text x="200" y="282" font-family="Arial" font-size="8" fill="#4b5563">Upacara bendera memperingati HUT RI Ke-81 secara khidmat.</text>
  
  <text x="110" y="300" font-family="Arial" font-size="10" font-weight="bold">08.00-08.30</text>
  <text x="200" y="300" font-family="Arial" font-size="11" font-weight="bold" fill="#15803d">FOTO BERSAMA</text>
  <text x="200" y="312" font-family="Arial" font-size="8" fill="#4b5563">Foto bersama seluruh warga, panitia, dan peserta sebagai kenang-kenangan.</text>
  
  <!-- SIANG -->
  <rect x="20" y="330" width="60" height="40" rx="5" fill="#b91c1c"/>
  <text x="50" y="345" text-anchor="middle" font-family="Arial Black" font-size="12" fill="white">SIANG</text>
  <text x="50" y="360" text-anchor="middle" font-family="Arial" font-size="8" fill="white">08.30-16.30 WIB</text>
  
  <rect x="100" y="330" width="680" height="200" fill="white" stroke="#fca5a5" stroke-width="1" rx="10"/>
  <text x="110" y="350" font-family="Arial" font-size="10" font-weight="bold">08.30-09.30</text>
  <text x="200" y="350" font-family="Arial" font-size="11" font-weight="bold" fill="#b91c1c">PERLOMBAAN ANAK-ANAK</text>
  <text x="200" y="362" font-family="Arial" font-size="8" fill="#4b5563">Makan Kerupuk, Balap Kelereng, Estafet Penguin, dan lainnya.</text>
  
  <text x="110" y="380" font-family="Arial" font-size="10" font-weight="bold">09.30-11.00</text>
  <text x="200" y="380" font-family="Arial" font-size="11" font-weight="bold" fill="#b91c1c">PERLOMBAAN REMAJA</text>
  <text x="200" y="392" font-family="Arial" font-size="8" fill="#4b5563">Futsal Mini, Salah Sambung, Jalan Penguin, dan lainnya.</text>
  
  <text x="110" y="410" font-family="Arial" font-size="10" font-weight="bold">11.00-12.30</text>
  <text x="200" y="410" font-family="Arial" font-size="11" font-weight="bold" fill="#b91c1c">PERLOMBAAN BAPAK-BAPAK</text>
  <text x="200" y="422" font-family="Arial" font-size="8" fill="#4b5563">Tarik Tambang, Joget Rebut Kursi, Estafet Tepung, dan lainnya.</text>
  
  <text x="110" y="440" font-family="Arial" font-size="10" font-weight="bold">13.00-15.00</text>
  <text x="200" y="440" font-family="Arial" font-size="11" font-weight="bold" fill="#b91c1c">PERLOMBAAN IBU-IBU</text>
  <text x="200" y="452" font-family="Arial" font-size="8" fill="#4b5563">Fashion Week Daster, Hias Tumpeng, Joget Rebut Kursi, Estafet Tepung, dan lainnya.</text>
  
  <text x="110" y="470" font-family="Arial" font-size="10" font-weight="bold">15.00-16.30</text>
  <text x="200" y="470" font-family="Arial" font-size="11" font-weight="bold" fill="#b91c1c">PERLOMBAAN KELUARGA</text>
  <text x="200" y="482" font-family="Arial" font-size="8" fill="#4b5563">Make Up Buta dan lomba kebersamaan keluarga.</text>
  
  <!-- MALAM -->
  <rect x="20" y="540" width="60" height="40" rx="5" fill="#d97706"/>
  <text x="50" y="555" text-anchor="middle" font-family="Arial Black" font-size="12" fill="white">MALAM</text>
  <text x="50" y="570" text-anchor="middle" font-family="Arial" font-size="8" fill="white">19.00-22.00 WIB</text>
  
  <rect x="100" y="540" width="680" height="200" fill="white" stroke="#fcd34d" stroke-width="1" rx="10"/>
  <text x="110" y="560" font-family="Arial" font-size="10" font-weight="bold">19.00-19.30</text>
  <text x="200" y="560" font-family="Arial" font-size="11" font-weight="bold" fill="#d97706">HIBURAN WARGA</text>
  <text x="200" y="572" font-family="Arial" font-size="8" fill="#4b5563">Penampilan seni, musik, dan hiburan dari warga serta tamu undangan.</text>
  
  <text x="110" y="590" font-family="Arial" font-size="10" font-weight="bold">19.30-20.00</text>
  <text x="200" y="590" font-family="Arial" font-size="11" font-weight="bold" fill="#d97706">DOORPRIZE</text>
  <text x="200" y="602" font-family="Arial" font-size="8" fill="#4b5563">Pembagian doorprize menarik bagi masyarakat yang hadir.</text>
  
  <text x="110" y="620" font-family="Arial" font-size="10" font-weight="bold">20.00-20.30</text>
  <text x="200" y="620" font-family="Arial" font-size="11" font-weight="bold" fill="#d97706">HIAS TUMPENG &amp; FASHION SHOW DASTER</text>
  <text x="200" y="632" font-family="Arial" font-size="8" fill="#4b5563">Penilaian dan penampilan terbaik dari ibu-ibu peserta lomba.</text>
  
  <text x="110" y="650" font-family="Arial" font-size="10" font-weight="bold">20.30-21.30</text>
  <text x="200" y="650" font-family="Arial" font-size="11" font-weight="bold" fill="#d97706">PEMBAGIAN HADIAH</text>
  <text x="200" y="662" font-family="Arial" font-size="8" fill="#4b5563">Penyerahan hadiah kepada para pemenang lomba.</text>
  
  <text x="110" y="680" font-family="Arial" font-size="10" font-weight="bold">21.30-22.00</text>
  <text x="200" y="680" font-family="Arial" font-size="11" font-weight="bold" fill="#d97706">PENUTUPAN</text>
  <text x="200" y="692" font-family="Arial" font-size="8" fill="#4b5563">Penutupan acara dan doa bersama sebagai ungkapan syukur.</text>
  
  <!-- Footer quote -->
  <rect x="40" y="720" width="720" height="40" rx="10" fill="#fef2f2" stroke="#fecaca"/>
  <text x="400" y="735" text-anchor="middle" font-family="Arial" font-size="10" font-style="italic">Dengan semangat kebersamaan, mari kita sukseskan</text>
  <text x="400" y="748" text-anchor="middle" font-family="Arial" font-size="10" font-weight="bold">Peringatan HUT RI Ke-81 yang meriah, bermakna, dan membanggakan.</text>
  
  <!-- Footer flag -->
  <rect x="0" y="780" width="800" height="20" fill="#dc2626"/>
  <rect x="0" y="800" width="800" height="20" fill="white"/>
</svg>
